name: Device Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      soak_iterations:
        description: "連続実行回数（ソークテスト。NFR-101のフレーク率計測）"
        default: "1"

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ADR-006の落とし穴1: JDKはFlutterのGradleビルドと互換のある17に固定する
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1" # .fvmrc と同期させること
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Run endevir tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: false # アニメーション下の安定性こそ検証対象
          script: ./scripts/soak.sh ${{ inputs.soak_iterations || '1' }} android emulator-5554

      - name: Upload trace and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: endevir-artifacts
          path: |
            examples/flutter_app/.endevir/trace.jsonl
            examples/flutter_app/.endevir/report.html
          if-no-files-found: ignore
